<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="glass-bg">
    <div class="glass-card">
        <i class="fas fa-user-shield fa-3x" style="color:#00d2ff"></i>
        <h2 style="margin: 15px 0;">Admin Portal</h2>
        <form action="/admin-panel" method="POST">
            <input type="text" name="username" class="input-box" placeholder="Username" required>
            <input type="password" name="password" class="input-box" placeholder="Password" required>
            <button type="submit">UNLOCK DATABASE</button>
        </form>
        <br><a href="/options" style="color:white; font-size:12px;">Cancel</a>
    </div>
</body>
</html>
