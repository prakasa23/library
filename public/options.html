<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="glass-bg">
    <div class="glass-card">
        <h2><i class="fas fa-book-reader"></i> Library Services</h2>
        <br>
        <form action="/submit" method="POST">
            <input type="text" name="user" class="input-box" placeholder="Your Name" required>
            <input type="text" name="book" class="input-box" placeholder="Book Name" required>
            
            <select name="action" class="icon-select">
                <option value="Take Book">📖 Take Book</option>
                <option value="Return Book">🔄 Return Book</option>
                <option value="Buy Book">💰 Buy Book</option>
                <option value="Wanted Book">⭐ Wanted Book Name</option>
            </select>

            <button type="submit">PROCESS REQUEST</button>
        </form>
        <a href="/login" style="display:block; margin-top:20px; color:#00d2ff; font-size:12px; text-decoration:none;">LIBRARIAN SECURE LOGIN</a>
    </div>
</body>
</html>
